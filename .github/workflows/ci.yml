name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/SoPorHoje.Tests/SoPorHoje.Tests.csproj

      - name: Build
        run: dotnet build src/SoPorHoje.Tests/SoPorHoje.Tests.csproj --no-restore -c Release

      - name: Test
        run: |
          dotnet test src/SoPorHoje.Tests/SoPorHoje.Tests.csproj \
            --no-build \
            -c Release \
            --logger "trx;LogFileName=results.trx" \
            --collect:"XPlat Code Coverage"

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: '**/results.trx'
          reporter: dotnet-trx

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: '**/coverage.cobertura.xml'
          retention-days: 7
